<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- Header / TopAppBar (Suppressed navigation for transactional focus) -->
<header class="sticky top-0 z-50 bg-[#131313] border-b border-[#353535]/30">
<div class="flex justify-between items-center w-full px-6 py-5 max-w-[1920px] mx-auto">
<div class="flex items-center gap-4">
<span class="text-xl font-black tracking-[0.15em] text-white font-headline">KMT GLOBAL</span>
</div>
<button class="text-secondary hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<main class="min-h-[calc(100vh-144px)] flex flex-col items-center px-6 py-8">
<!-- Progress Indicator -->
<div class="w-full max-w-md mb-12">
<div class="flex justify-between mb-4">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-primary">Step 02 — Technical Specs</span>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary">40% Complete</span>
</div>
<div class="h-[2px] w-full bg-surface-container-highest">
<div class="h-full bg-primary w-[40%] transition-all duration-500"></div>
</div>
</div>
<!-- Form Container -->
<div class="w-full max-w-md space-y-10">
<header>
<h1 class="font-headline text-4xl font-bold tracking-tighter uppercase text-white mb-2">Vehicle Details</h1>
<p class="text-secondary font-light leading-relaxed">Define the precise parameters for your automotive acquisition.</p>
</header>
<form class="space-y-8">
<!-- Vehicle Model -->
<div class="group border-b border-outline-variant/30 pb-2 focus-within:border-primary transition-colors">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block mb-1">Make &amp; Model</label>
<input class="w-full bg-transparent border-none p-0 text-white placeholder:text-surface-container-highest text-lg focus:ring-0" placeholder="e.g. Nissan Skyline GT-R R34" type="text"/>
</div>
<!-- Grid for Year & Mileage -->
<div class="grid grid-cols-2 gap-8">
<div class="group border-b border-outline-variant/30 pb-2 focus-within:border-primary transition-colors">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block mb-1">Year Range</label>
<select class="w-full bg-transparent border-none p-0 text-white text-lg focus:ring-0 appearance-none">
<option class="bg-surface">1995 — 2002</option>
<option class="bg-surface">2003 — 2010</option>
<option class="bg-surface">2011 — Present</option>
</select>
</div>
<div class="group border-b border-outline-variant/30 pb-2 focus-within:border-primary transition-colors">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block mb-1">Max Mileage (KM)</label>
<input class="w-full bg-transparent border-none p-0 text-white placeholder:text-surface-container-highest text-lg focus:ring-0" placeholder="80,000" type="number"/>
</div>
</div>
<!-- Transmission Selection (Asymmetric Chips) -->
<div class="space-y-3">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block">Transmission Preference</label>
<div class="flex gap-2">
<button class="flex-1 py-3 px-4 bg-primary text-on-primary font-label text-[11px] uppercase tracking-widest transition-all" type="button">Manual</button>
<button class="flex-1 py-3 px-4 bg-surface-container-highest text-secondary font-label text-[11px] uppercase tracking-widest hover:bg-surface-bright transition-all" type="button">Automatic</button>
</div>
</div>
<!-- Exterior Color Selection -->
<div class="space-y-4">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block">Exterior Finish</label>
<div class="grid grid-cols-4 gap-3">
<div class="aspect-square bg-white ring-1 ring-offset-4 ring-offset-background ring-primary cursor-pointer"></div>
<div class="aspect-square bg-[#1a1a1a] border border-outline-variant cursor-pointer hover:border-primary transition-colors"></div>
<div class="aspect-square bg-[#474747] border border-outline-variant cursor-pointer hover:border-primary transition-colors"></div>
<div class="aspect-square bg-[#8e8e8e] border border-outline-variant cursor-pointer hover:border-primary transition-colors"></div>
</div>
</div>
<!-- Budget Range -->
<div class="group border-b border-outline-variant/30 pb-2 focus-within:border-primary transition-colors">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary block mb-1">Maximum Budget (JPY)</label>
<div class="flex items-center">
<span class="text-secondary mr-2">¥</span>
<input class="w-full bg-transparent border-none p-0 text-white placeholder:text-surface-container-highest text-lg focus:ring-0" placeholder="5,000,000" type="text"/>
</div>
</div>
<!-- Visual Reference (Optional Image Upload Style) -->
<div class="relative group cursor-pointer overflow-hidden border border-dashed border-outline-variant/50 p-6 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-secondary">add_a_photo</span>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary">Upload Reference Image</span>
</div>
</form>
</div>
</main>
<!-- Sticky Footer Actions -->
<footer class="sticky bottom-0 w-full bg-surface-container-lowest/80 backdrop-blur-xl border-t border-[#353535]/50 px-6 py-4 z-50">
<div class="max-w-md mx-auto flex gap-4">
<button class="flex-[0.4] py-4 bg-transparent border border-outline-variant/30 text-secondary font-label text-xs uppercase tracking-[0.2em] hover:bg-surface-container-highest transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Back
            </button>
<button class="flex-1 py-4 bg-primary text-on-primary font-label text-xs uppercase tracking-[0.2em] font-bold hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[0px_20px_40px_rgba(255,255,255,0.1)]">
                Next Step
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</footer>

</div>
